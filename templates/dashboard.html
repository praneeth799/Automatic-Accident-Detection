<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AccidentWatch — Live Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#060d18;--panel:#0b1628;--border:#152340;
  --accent:#00c8ff;--danger:#ff2d55;--warn:#ff9f0a;
  --ok:#32d74b;--text:#c8daf0;--dim:#3a5070;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:var(--panel);border-bottom:1px solid var(--border)}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--danger)}
.live-badge{display:flex;align-items:center;gap:8px;
  font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--ok)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.8)}}
#ts{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--dim)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 28px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px 20px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.s-total::after{background:var(--accent)}
.stat.s-c::after{background:var(--danger)}
.stat.s-h::after{background:var(--warn)}
.stat.s-m::after{background:#ffd60a}
.stat.s-l::after{background:var(--ok)}
.stat-lbl{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.stat-val{font-size:2.2rem;font-weight:700}
.s-c .stat-val{color:var(--danger)}
.s-h .stat-val{color:var(--warn)}
.s-m .stat-val{color:#ffd60a}
.s-l .stat-val{color:var(--ok)}
.main{padding:0 28px 28px;display:grid;grid-template-columns:1fr 360px;gap:16px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.acc-list{overflow-y:auto;max-height:540px}
.acc-item{padding:14px 18px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;transition:background .2s}
.acc-item:hover{background:rgba(0,200,255,.03)}
.sev{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:3px 8px;border-radius:3px;letter-spacing:1px;font-weight:700;white-space:nowrap}
.sev-CRITICAL{background:rgba(255,45,85,.15);color:#ff2d55;border:1px solid #ff2d5530}
.sev-HIGH{background:rgba(255,159,10,.15);color:#ff9f0a;border:1px solid #ff9f0a30}
.sev-MEDIUM{background:rgba(255,214,10,.15);color:#ffd60a;border:1px solid #ffd60a30}
.sev-LOW{background:rgba(50,215,75,.15);color:#32d74b;border:1px solid #32d74b30}
.acc-addr{font-size:.9rem;font-weight:600;color:var(--text)}
.acc-area{font-size:.75rem;color:var(--accent);margin-top:2px}
.acc-meta{font-size:.7rem;color:var(--dim);font-family:'Share Tech Mono',monospace;margin-top:3px}
.acc-conf{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--dim)}
.btn-row{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.btn{font-family:'Share Tech Mono',monospace;font-size:.62rem;padding:3px 10px;border-radius:3px;border:1px solid var(--border);color:var(--accent);text-decoration:none;transition:all .2s;cursor:pointer;background:none}
.btn:hover{background:var(--accent);color:var(--bg)}
.right{display:flex;flex-direction:column;gap:16px}
.map-frame{width:100%;height:240px;border:none}
.snap-wrap{padding:12px;text-align:center;min-height:80px;display:flex;align-items:center;justify-content:center}
#snap-img{max-width:100%;border-radius:4px;display:none}
.alert-box{padding:14px 18px;font-size:.8rem;line-height:1.8}
.alert-row{display:flex;gap:8px;margin-bottom:2px}
.alert-key{color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.68rem;min-width:80px}
.alert-val{color:var(--text);font-weight:600}
.alert-val.danger{color:var(--danger)}
.alert-val.warn{color:var(--warn)}
.alert-val.ok{color:var(--ok)}
.empty{padding:30px;text-align:center;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.75rem}
</style>
</head>
<body>

<header>
  <div class="logo">Accident<span>Watch</span></div>
  <span id="ts">—</span>
  <div class="live-badge"><div class="dot"></div>LIVE MONITORING</div>
</header>

<div class="stats">
  <div class="stat s-total"><div class="stat-lbl">Total Accidents</div><div class="stat-val" id="s-total">0</div></div>
  <div class="stat s-c"><div class="stat-lbl">Critical</div><div class="stat-val" id="s-critical">0</div></div>
  <div class="stat s-h"><div class="stat-lbl">High</div><div class="stat-val" id="s-high">0</div></div>
  <div class="stat s-m"><div class="stat-lbl">Medium</div><div class="stat-val" id="s-medium">0</div></div>
  <div class="stat s-l"><div class="stat-lbl">Low</div><div class="stat-val" id="s-low">0</div></div>
</div>

<div class="main">
  <div class="panel">
    <div class="ph"><span>Accident Records</span><span id="acc-count">—</span></div>
    <div class="acc-list" id="acc-list">
      <div class="empty">No accidents recorded yet.<br>System is monitoring...</div>
    </div>
  </div>

  <div class="right">
    <div class="panel">
      <div class="ph"><span>Last Accident Location</span></div>
      <iframe id="map-frame" class="map-frame"
        src="https://maps.google.com/maps?q=17.3850,78.4867&z=13&output=embed"
        allowfullscreen loading="lazy"></iframe>
    </div>

    <div class="panel">
      <div class="ph"><span>Latest Snapshot</span></div>
      <div class="snap-wrap">
        <img id="snap-img" src="" alt="snapshot">
        <div id="snap-empty" style="color:var(--dim);font-size:.75rem;font-family:'Share Tech Mono',monospace">No snapshot yet</div>
      </div>
    </div>

    <div class="panel">
      <div class="ph"><span>Latest Alert Details</span></div>
      <div class="alert-box" id="latest-box">
        <div class="empty" style="padding:10px">Waiting for detection...</div>
      </div>
    </div>
  </div>
</div>

<script>
async function loadStats(){
  try{
    const d=await(await fetch('/api/stats')).json();
    document.getElementById('s-total').textContent=d.total||0;
    document.getElementById('s-critical').textContent=d.CRITICAL||0;
    document.getElementById('s-high').textContent=d.HIGH||0;
    document.getElementById('s-medium').textContent=d.MEDIUM||0;
    document.getElementById('s-low').textContent=d.LOW||0;
    document.getElementById('ts').textContent='Updated: '+new Date().toLocaleTimeString();
  }catch(e){}
}

async function loadAccidents(){
  try{
    const list=(await(await fetch('/api/accidents')).json()).accidents||[];
    const el=document.getElementById('acc-list');
    document.getElementById('acc-count').textContent=list.length+' records';
    if(!list.length){
      el.innerHTML='<div class="empty">No accidents recorded yet.<br>System is monitoring...</div>';
      return;
    }
    el.innerHTML=list.map(a=>{
      const ts=a.timestamp||'';
      const time=ts.length>=15
        ?`${ts.slice(0,4)}-${ts.slice(4,6)}-${ts.slice(6,8)} ${ts.slice(9,11)}:${ts.slice(11,13)}:${ts.slice(13,15)}`
        :a.created_at||'—';
      const lm=(()=>{try{const l=JSON.parse(a.landmarks||'[]');return l.length?`<div class="acc-meta">🏥 ${l.join(' · ')}</div>`:''}catch{return ''}})();
      return `<div class="acc-item">
        <span class="sev sev-${a.severity}">${a.severity}</span>
        <div>
          <div class="acc-addr">📍 ${a.full_address||a.city||'Unknown'}</div>
          ${a.area?`<div class="acc-area">📌 ${a.area}${a.road?' · '+a.road:''}</div>`:''}
          <div class="acc-meta">📷 ${a.camera_id} | 🕒 ${time} | 🚗 ${a.vehicles_involved||'?'} vehicles</div>
          <div class="acc-meta">Score: ${Math.round((a.severity_score||0)*100)}% | Conf: ${Math.round((a.confidence||0)*100)}%</div>
          ${lm}
          <div class="btn-row">
            ${a.maps_link?`<a class="btn" href="${a.maps_link}" target="_blank">🗺 Maps</a>`:''}
            ${a.clip_path?`<a class="btn" href="/api/clip/${a.id}">⬇ Clip</a>`:''}
            ${a.snapshot_path?`<a class="btn" href="/api/snapshot/${a.id}" target="_blank">📸 Snap</a>`:''}
          </div>
        </div>
        <div class="acc-conf">${Math.round((a.confidence||0)*100)}%</div>
      </div>`;
    }).join('');

    const latest=list[0];
    if(latest){
      if(latest.latitude&&latest.longitude){
        document.getElementById('map-frame').src=
          `https://maps.google.com/maps?q=${latest.latitude},${latest.longitude}&z=15&output=embed`;
      }
      if(latest.snapshot_path){
        const img=document.getElementById('snap-img');
        img.src=`/api/snapshot/${latest.id}?t=${Date.now()}`;
        img.style.display='block';
        document.getElementById('snap-empty').style.display='none';
      }
      const lm=(()=>{try{return JSON.parse(latest.landmarks||'[]').join(', ')||'None'}catch{return 'None'}})();
      const sc={CRITICAL:'danger',HIGH:'warn',MEDIUM:'',LOW:'ok'};
      document.getElementById('latest-box').innerHTML=`
        <div class="alert-row"><span class="alert-key">Severity</span><span class="alert-val ${sc[latest.severity]||''}">${latest.severity}</span></div>
        <div class="alert-row"><span class="alert-key">Location</span><span class="alert-val">${latest.full_address||'—'}</span></div>
        <div class="alert-row"><span class="alert-key">Area</span><span class="alert-val">${latest.area||'—'}</span></div>
        <div class="alert-row"><span class="alert-key">Road</span><span class="alert-val">${latest.road||'—'}</span></div>
        <div class="alert-row"><span class="alert-key">Landmarks</span><span class="alert-val">${lm}</span></div>
        <div class="alert-row"><span class="alert-key">Vehicles</span><span class="alert-val">${latest.vehicles_involved||'?'}</span></div>
        <div class="alert-row"><span class="alert-key">Confidence</span><span class="alert-val">${Math.round((latest.confidence||0)*100)}%</span></div>
        <div class="alert-row"><span class="alert-key">Camera</span><span class="alert-val">${latest.camera_id||'—'}</span></div>
        <div class="alert-row"><span class="alert-key">Alert Sent</span><span class="alert-val ok">${latest.alert_sent?'✅ Yes':'⏳ Pending'}</span></div>`;
    }
  }catch(e){}
}

function refresh(){loadStats();loadAccidents();}
refresh();
setInterval(refresh,4000);
</script>
</body>
</html>
